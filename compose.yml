services:
  app:
    build: .
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://student:heslo123@db:5432/myapp

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=student
      - POSTGRES_PASSWORD=heslo123
      - POSTGRES_DB=myapp
      - PGDATA=/data/pgdata
